steps:
  - uses: actions/checkout@v4

  - name: Run action (first time — should generate)
    id: first
    uses: andreia/generate-favicons@v1
    with:
      image:   assets/logo.svg
      preset:  all
      force:   "false"

  - run: echo "skipped=${{ steps.first.outputs.skipped }}, files=${{ steps.first.outputs.files_generated }}"

  - name: Run action (second time — should skip)
    id: second
    uses: andreia/generate-favicons@v1
    with:
      image:   assets/logo.svg
      preset:  all
      force:   "false"

  - run: |
      [[ "${{ steps.second.outputs.skipped }}" == "true" ]] \
        && echo "✅ Skip logic works" \
        || { echo "❌ Should have been skipped"; exit 1; }

  - uses: actions/upload-artifact@v4
    with:
      name: test-favicons
      path: public/favicons/